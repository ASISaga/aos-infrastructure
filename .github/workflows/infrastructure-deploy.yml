name: Infrastructure Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      resource_group:
        description: 'Azure resource group name (leave blank for default rg-aos-<env>)'
        required: false
        type: string
      location:
        description: 'Primary Azure region (auto-selected if empty)'
        required: false
        type: string
        default: ''
      geography:
        description: 'Geographic preference for auto-region selection (used when location is empty)'
        required: false
        type: choice
        options:
          - ''
          - americas
          - europe
          - asia
        default: ''
      template:
        description: 'Bicep template file path'
        required: false
        type: string
        default: 'deployment/main-modular.bicep'
      dry_run:
        description: 'Plan only — no actual changes (lint → validate → what-if)'
        required: false
        type: boolean
        default: false
      skip_health_checks:
        description: 'Skip post-deployment health checks'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # VALIDATE — Lint, validate Bicep templates and parameters
  # ============================================================================
  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      resource_group: ${{ steps.resolve.outputs.resource_group }}
      parameters_file: ${{ steps.resolve.outputs.parameters_file }}
      is_dry_run: ${{ steps.resolve.outputs.is_dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve inputs
        id: resolve
        run: |
          ENV="${{ inputs.environment }}"
          RG="${{ inputs.resource_group }}"
          [ -z "$RG" ] && RG="rg-aos-${ENV}"
          TEMPLATE="${{ inputs.template || 'deployment/main-modular.bicep' }}"
          IS_DRY_RUN="${{ inputs.dry_run }}"
          PARAMS="deployment/parameters/${ENV}.bicepparam"
          [ ! -f "$PARAMS" ] && PARAMS=""

          echo "environment=$ENV"       >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG"     >> "$GITHUB_OUTPUT"
          echo "template=$TEMPLATE"     >> "$GITHUB_OUTPUT"
          echo "parameters_file=$PARAMS" >> "$GITHUB_OUTPUT"
          echo "is_dry_run=$IS_DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Install Azure Bicep
        run: az bicep install

      - name: Lint Bicep template
        id: lint
        continue-on-error: true
        run: |
          echo "🔍 Linting ${{ inputs.template || 'deployment/main-modular.bicep' }}..."
          az bicep lint --file "${{ inputs.template || 'deployment/main-modular.bicep' }}" 2>&1 | tee lint-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Validation summary
        if: always()
        run: |
          echo "## 🔍 Template Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bicep lint | ${{ steps.lint.outcome == 'success' && '✅ passed' || '⚠️ warnings (non-blocking)' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ steps.resolve.outputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ steps.resolve.outputs.resource_group }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | ${{ inputs.dry_run == true && '📋 Plan (dry-run)' || '🚀 Deploy' }} |" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # DEPLOY — Execute the Python orchestrator
  # ============================================================================
  deploy:
    name: Deploy Infrastructure
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ needs.validate.outputs.environment }}
    outputs:
      status: ${{ steps.orchestrator.outcome }}
      failure_type: ${{ steps.analyze.outputs.failure_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r deployment/orchestrator/requirements.txt

      - name: Azure Login (OIDC)
        id: login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Auto-select deployment regions
        id: region_select
        run: |
          python3 deployment/orchestrator/cli/workflow_helper.py select-regions \
            --environment "${{ needs.validate.outputs.environment }}" \
            --location "${{ inputs.location }}" \
            --geography "${{ inputs.geography }}"

      - name: Execute Python orchestrator
        id: orchestrator
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [[ "${{ needs.validate.outputs.is_dry_run }}" == "true" ]]; then
            SUBCOMMAND="plan"
          else
            SUBCOMMAND="deploy"
          fi

          ARGS=(
            "$SUBCOMMAND"
            --resource-group "${{ needs.validate.outputs.resource_group }}"
            --location "${{ steps.region_select.outputs.primary_region }}"
            --location-ml "${{ steps.region_select.outputs.ml_region }}"
            --environment "${{ needs.validate.outputs.environment }}"
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}"
            --allow-warnings
            --git-sha "${{ github.sha }}"
          )

          PARAMS="${{ needs.validate.outputs.parameters_file }}"
          if [[ -n "$PARAMS" && -f "$PARAMS" ]]; then
            ARGS+=(--parameters "$PARAMS")
          fi

          if [[ "${{ inputs.skip_health_checks }}" == "true" ]]; then
            ARGS+=(--skip-health)
          fi

          set +e
          python3 deployment/deploy.py "${ARGS[@]}" 2>&1 | tee orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          echo "output_file=orchestrator-output.log" >> "$GITHUB_OUTPUT"
          exit ${EXIT_CODE}

      - name: Analyze orchestrator output
        id: analyze
        if: always()
        run: |
          python3 deployment/orchestrator/cli/workflow_helper.py analyze-output \
            --log-file "${{ steps.orchestrator.outputs.output_file || 'orchestrator-output.log' }}" \
            --exit-code "${{ steps.orchestrator.outputs.exit_code || '1' }}"

      - name: Extract deployment summary
        id: summary
        if: always()
        run: |
          python3 deployment/orchestrator/cli/workflow_helper.py extract-summary \
            --audit-dir deployment/audit

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-audit-${{ github.run_id }}
          path: |
            deployment/audit/*.json
            orchestrator-*.log
          retention-days: 90
          if-no-files-found: ignore

      - name: Deployment result
        if: always()
        run: |
          STATUS="${{ steps.orchestrator.outcome }}"
          FAILURE_TYPE="${{ steps.analyze.outputs.failure_type }}"
          IS_DRY_RUN="${{ needs.validate.outputs.is_dry_run }}"
          WHAT_IF_CREATES="${{ steps.summary.outputs.what_if_creates }}"
          WHAT_IF_NO_CHANGES="${{ steps.summary.outputs.what_if_no_changes }}"
          WHAT_IF_MODIFIES="${{ steps.summary.outputs.what_if_modifies }}"
          WHAT_IF_DELETES="${{ steps.summary.outputs.what_if_deletes }}"

          echo "## 🚀 Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$STATUS" == "success" ]]; then
            echo "### ✅ Deployment Succeeded" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$IS_DRY_RUN" == "true" ]]; then
            echo "### 📋 Plan Completed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Failure type**: \`${FAILURE_TYPE}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            case "$FAILURE_TYPE" in
              permissions)
                echo "#### 🔑 Action Required: RBAC Permissions" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "The deployment service principal lacks \`Microsoft.Authorization/roleAssignments/write\`." >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "**Fix**: Grant the service principal **User Access Administrator** or **Owner** on \`${{ needs.validate.outputs.resource_group }}\`:" >> "$GITHUB_STEP_SUMMARY"
                echo '```bash' >> "$GITHUB_STEP_SUMMARY"
                echo "az role assignment create \\" >> "$GITHUB_STEP_SUMMARY"
                echo "  --assignee \"\$AZURE_CLIENT_ID\" \\" >> "$GITHUB_STEP_SUMMARY"
                echo "  --role \"User Access Administrator\" \\" >> "$GITHUB_STEP_SUMMARY"
                echo "  --resource-group \"${{ needs.validate.outputs.resource_group }}\"" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                ;;
              logic)
                echo "#### 🐛 Action Required: Template/Code Error" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "A Bicep template or Python orchestrator error was detected." >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "**Fix**: Review the orchestrator log artifact for the specific error, fix the template or parameters, and re-run." >> "$GITHUB_STEP_SUMMARY"
                ;;
              environmental)
                echo "#### 🌐 Action Required: Transient Azure Error" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "An Azure platform error occurred (throttling, timeout, service outage)." >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "**Fix**: Wait a few minutes and re-run. Check [Azure Status](https://status.azure.com) if the issue persists." >> "$GITHUB_STEP_SUMMARY"
                ;;
              *)
                echo "#### ⚠️ Review the orchestrator log artifact for details." >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ needs.validate.outputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ needs.validate.outputs.resource_group }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Primary Region | \`${{ steps.region_select.outputs.primary_region }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ML Region | \`${{ steps.region_select.outputs.ml_region }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | ${{ needs.validate.outputs.is_dry_run == 'true' && 'Plan (dry-run)' || 'Deploy' }} |" >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "$WHAT_IF_CREATES" ]] && [[ "$WHAT_IF_CREATES" != "0" || "$WHAT_IF_NO_CHANGES" != "0" || "$WHAT_IF_MODIFIES" != "0" || "$WHAT_IF_DELETES" != "0" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 📊 Resource Changes (What-If)" >> "$GITHUB_STEP_SUMMARY"
            echo "| Action | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| ✅ Create | ${WHAT_IF_CREATES:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 📦 No change | ${WHAT_IF_NO_CHANGES:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 🔄 Modify | ${WHAT_IF_MODIFIES:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 🗑️ Delete | ${WHAT_IF_DELETES:-0} |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ============================================================================
  # RESOURCE INVENTORY — Show what was provisioned and where code deploys
  # ============================================================================
  resource-inventory:
    name: Resource Inventory
    needs: [validate, deploy]
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ needs.validate.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        id: login
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List provisioned resources
        id: inventory
        continue-on-error: true
        run: |
          RG="${{ needs.validate.outputs.resource_group }}"

          echo "## 📦 Provisioned Resource Inventory" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if ! az group show --name "$RG" &>/dev/null; then
            echo "Resource group \`$RG\` does not exist yet. Run the deployment first." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          RESOURCES=$(az resource list --resource-group "$RG" \
            --query "[].{name:name, type:type, location:location}" -o json 2>/dev/null || echo "[]")

          if [[ "$RESOURCES" == "[]" ]]; then
            echo "No resources found in \`$RG\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "### Resources in \`$RG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Type | Location | Bicep Module |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|----------|-------------|" >> "$GITHUB_STEP_SUMMARY"

          echo "$RESOURCES" | python3 deployment/orchestrator/cli/resource_mapper.py >> "$GITHUB_STEP_SUMMARY"

      - name: Code repository deployment guide
        if: always()
        run: |
          ENV="${{ needs.validate.outputs.environment }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🗺️ Code Repository → Azure Deployment Target" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Each deployable repository gets a dedicated Azure Function App created by \`modules/functionapp.bicep\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Function Apps follow the naming pattern: \`func-{appName}-${ENV}-{uniqueSuffix}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Platform Services (Function Apps)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | Azure Function App | Custom Domain |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-------------------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| [agent-operating-system](https://github.com/ASISaga/agent-operating-system) | \`func-agent-operating-system-${ENV}-*\` | \`agent-operating-system.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [aos-realm-of-agents](https://github.com/ASISaga/aos-realm-of-agents) | \`func-aos-realm-of-agents-${ENV}-*\` | \`aos-realm-of-agents.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [business-infinity](https://github.com/ASISaga/business-infinity) | \`func-business-infinity-${ENV}-*\` | \`business-infinity.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Note**: \`aos-kernel\`, \`aos-intelligence\`, \`aos-client-sdk\`, and \`aos-dispatcher\` are code-only Python library repositories — they have no dedicated Function Apps and are imported at runtime by \`agent-operating-system\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### MCP Server Modules (Function Apps)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | Azure Function App | Custom Domain |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-------------------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| [erpnext.asisaga.com](https://github.com/ASISaga/erpnext.asisaga.com) | \`func-mcp-erpnext-${ENV}-*\` | \`erpnext.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [linkedin.asisaga.com](https://github.com/ASISaga/linkedin.asisaga.com) | \`func-mcp-linkedin-${ENV}-*\` | \`linkedin.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [reddit.asisaga.com](https://github.com/ASISaga/reddit.asisaga.com) | \`func-mcp-reddit-${ENV}-*\` | \`reddit.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [subconscious.asisaga.com](https://github.com/ASISaga/subconscious.asisaga.com) | \`func-mcp-subconscious-${ENV}-*\` | \`subconscious.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### C-Suite Agents (Foundry Endpoints)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "C-suite agents deploy to Azure AI Foundry via \`modules/foundry-app.bicep\`, not as Function Apps." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | Foundry Endpoint | Bicep Module |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-----------------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| [ceo-agent](https://github.com/ASISaga/ceo-agent) | \`ceo-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cfo-agent](https://github.com/ASISaga/cfo-agent) | \`cfo-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cto-agent](https://github.com/ASISaga/cto-agent) | \`cto-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cso-agent](https://github.com/ASISaga/cso-agent) | \`cso-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cmo-agent](https://github.com/ASISaga/cmo-agent) | \`cmo-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Shared Infrastructure (Bicep modules, no separate code repo)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bicep Module | Resources Created | Purpose |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-------------------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/monitoring.bicep\` | Log Analytics workspace, Application Insights | Centralized logging & telemetry |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/storage.bicep\` | Storage Account | Function App backing store & deployment packages |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/servicebus.bicep\` | Service Bus namespace + queue | Orchestration messaging between agents |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/keyvault.bicep\` | Key Vault | Secrets management |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-services.bicep\` | Azure AI Services (Cognitive) | LLM and cognitive API access |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-hub.bicep\` | Azure AI Foundry Hub | ML workspace hub for agent models |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-project.bicep\` | Azure AI Foundry Project | Agent project workspace |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-gateway.bicep\` | API Management | Rate limiting, JWT validation, AI gateway |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/model-registry.bicep\` | Model Registry | LoRA adapter storage |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/a2a-connections.bicep\` | A2A connections | Agent-to-Agent boardroom orchestration |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/policy.bicep\` | Azure Policy assignments | Governance: location, HTTPS, KV soft-delete |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/budget.bicep\` | Cost Management budget | Monthly spend alerts |" >> "$GITHUB_STEP_SUMMARY"
