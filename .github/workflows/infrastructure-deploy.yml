name: Infrastructure Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      resource_group:
        description: 'Azure resource group name (leave blank for default rg-aos-<env>)'
        required: false
        type: string
      location:
        description: 'Primary Azure region (auto-selected if empty)'
        required: false
        type: string
        default: ''
      geography:
        description: 'Geographic preference for auto-region selection (used when location is empty)'
        required: false
        type: choice
        options:
          - ''
          - americas
          - europe
          - asia
        default: ''
      template:
        description: 'Bicep template file path'
        required: false
        type: string
        default: 'deployment/main-modular.bicep'
      dry_run:
        description: 'Plan only — no actual changes (lint → validate → what-if)'
        required: false
        type: boolean
        default: false
      skip_health_checks:
        description: 'Skip post-deployment health checks'
        required: false
        type: boolean
        default: false
      deploy_function_apps:
        description: 'Deploy Python Function Apps via SDK bridge after Bicep (requires aos-client-sdk)'
        required: false
        type: boolean
        default: false
      sync_kernel_config:
        description: 'Sync AOS kernel env vars to all Function Apps after deployment'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  # Required to dispatch repository_dispatch events to code repositories
  # (via DEPLOY_DISPATCH_TOKEN secret — a PAT with repo scope)
  actions: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # VALIDATE — Lint, validate Bicep templates and parameters
  # ============================================================================
  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      resource_group: ${{ steps.resolve.outputs.resource_group }}
      parameters_file: ${{ steps.resolve.outputs.parameters_file }}
      is_dry_run: ${{ steps.resolve.outputs.is_dry_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve inputs
        id: resolve
        run: |
          ENV="${{ inputs.environment }}"
          RG="${{ inputs.resource_group }}"
          [ -z "$RG" ] && RG="rg-aos-${ENV}"
          TEMPLATE="${{ inputs.template || 'deployment/main-modular.bicep' }}"
          IS_DRY_RUN="${{ inputs.dry_run }}"
          PARAMS="deployment/parameters/${ENV}.bicepparam"
          [ ! -f "$PARAMS" ] && PARAMS=""

          echo "environment=$ENV"       >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG"     >> "$GITHUB_OUTPUT"
          echo "template=$TEMPLATE"     >> "$GITHUB_OUTPUT"
          echo "parameters_file=$PARAMS" >> "$GITHUB_OUTPUT"
          echo "is_dry_run=$IS_DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Install Azure Bicep
        run: az bicep install

      - name: Lint Bicep template
        id: lint
        continue-on-error: true
        run: |
          echo "🔍 Linting ${{ inputs.template || 'deployment/main-modular.bicep' }}..."
          az bicep lint --file "${{ inputs.template || 'deployment/main-modular.bicep' }}" 2>&1 | tee lint-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Validation summary
        if: always()
        run: |
          echo "## 🔍 Template Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bicep lint | ${{ steps.lint.outcome == 'success' && '✅ passed' || '⚠️ warnings (non-blocking)' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ steps.resolve.outputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ steps.resolve.outputs.resource_group }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | ${{ inputs.dry_run == true && '📋 Plan (dry-run)' || '🚀 Deploy' }} |" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # DEPLOY — Execute the Python orchestrator
  # ============================================================================
  deploy:
    name: Deploy Infrastructure
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ needs.validate.outputs.environment }}
    outputs:
      status: ${{ steps.orchestrator.outcome }}
      failure_type: ${{ steps.analyze.outputs.failure_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Azure Login (OIDC)
        id: login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Auto-select deployment regions
        id: region_select
        run: |
          python3 deployment/orchestrator/cli/workflow_helper.py select-regions \
            --environment "${{ needs.validate.outputs.environment }}" \
            --location "${{ inputs.location }}" \
            --geography "${{ inputs.geography }}"

      # ── Pipeline step 1 — Resource Group ─────────────────────────────────
      - name: Ensure Resource Group
        id: ensure_rg
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py ensure-rg \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Pipeline step 2 — Lint ────────────────────────────────────────────
      - name: Lint Bicep Template
        id: lint
        if: steps.ensure_rg.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py lint \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Pipeline step 3 — Validate ────────────────────────────────────────
      - name: Validate ARM Template
        id: arm_validate
        if: steps.ensure_rg.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          ARGS=(
            validate
            --resource-group "${{ needs.validate.outputs.resource_group }}"
            --location "${{ steps.region_select.outputs.primary_region }}"
            --location-ml "${{ steps.region_select.outputs.ml_region }}"
            --environment "${{ needs.validate.outputs.environment }}"
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}"
            --allow-warnings
            --git-sha "${{ github.sha }}"
          )
          PARAMS="${{ needs.validate.outputs.parameters_file }}"
          [[ -n "$PARAMS" && -f "$PARAMS" ]] && ARGS+=(--parameters "$PARAMS")
          set +e
          python3 deployment/deploy.py "${ARGS[@]}" 2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Pipeline step 4 — What-If ─────────────────────────────────────────
      - name: What-If Analysis
        id: what_if
        if: steps.ensure_rg.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          ARGS=(
            what-if
            --resource-group "${{ needs.validate.outputs.resource_group }}"
            --location "${{ steps.region_select.outputs.primary_region }}"
            --location-ml "${{ steps.region_select.outputs.ml_region }}"
            --environment "${{ needs.validate.outputs.environment }}"
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}"
            --allow-warnings
            --git-sha "${{ github.sha }}"
          )
          PARAMS="${{ needs.validate.outputs.parameters_file }}"
          [[ -n "$PARAMS" && -f "$PARAMS" ]] && ARGS+=(--parameters "$PARAMS")
          set +e
          python3 deployment/deploy.py "${ARGS[@]}" 2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Pipeline steps 5a–5e: Bicep Infrastructure Phases ────────────────
      # The monolithic "Deploy Bicep Infrastructure" step is replaced by 5
      # granular phase steps, each deploying a logical group of Bicep modules.
      # Each phase uses `az deployment group create` (incremental mode) and
      # shows a per-module Azure provisioning status table after completion.
      #
      # Phase dependency order: Foundation → AI Services → AI Applications
      #                                     Foundation → Function Apps
      #                         Governance runs independently (always)

      # ── Phase 1 — Foundation (monitoring / storage / serviceBus / keyVault) ──
      - name: "Bicep Phase 1 — Foundation"
        id: deploy_foundation
        if: >-
          needs.validate.outputs.is_dry_run != 'true' &&
          steps.arm_validate.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py deploy-bicep-foundation \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --location-ml "${{ steps.region_select.outputs.ml_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Phase 2 — AI Services (aiServices / aiHub / aiProject / modelRegistry) ──
      - name: "Bicep Phase 2 — AI Services"
        id: deploy_ai_services
        if: always() && needs.validate.outputs.is_dry_run != 'true' && steps.arm_validate.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          FOUNDATION_OUTCOME: ${{ steps.deploy_foundation.outcome }}
        run: |
          if [[ "$FOUNDATION_OUTCOME" != "success" ]]; then
            echo "⏭️  Phase 2 (AI Services) — no action: Phase 1 (Foundation) did not succeed (outcome: $FOUNDATION_OUTCOME)" | tee -a orchestrator-output.log
            exit 0
          fi
          set +e
          python3 deployment/deploy.py deploy-bicep-ai-services \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --location-ml "${{ steps.region_select.outputs.ml_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Phase 3 — AI Applications (loraInference / foundryApps / aiGateway / a2aConnections) ──
      - name: "Bicep Phase 3 — AI Applications"
        id: deploy_ai_apps
        if: always() && needs.validate.outputs.is_dry_run != 'true' && steps.arm_validate.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          FOUNDATION_OUTCOME: ${{ steps.deploy_foundation.outcome }}
          AI_SERVICES_OUTCOME: ${{ steps.deploy_ai_services.outcome }}
        run: |
          if [[ "$FOUNDATION_OUTCOME" != "success" || "$AI_SERVICES_OUTCOME" != "success" ]]; then
            echo "⏭️  Phase 3 (AI Applications) — no action: prerequisite phase did not succeed (foundation: $FOUNDATION_OUTCOME, ai-services: $AI_SERVICES_OUTCOME)" | tee -a orchestrator-output.log
            exit 0
          fi
          set +e
          python3 deployment/deploy.py deploy-bicep-ai-apps \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --location-ml "${{ steps.region_select.outputs.ml_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Phase 4 — Function Apps (functionApps / mcpServerFunctionApps) ──────
      # Depends only on Phase 1 (foundation), not on the AI phases.
      # Runs after Phase 3 in the sequential step order, but only requires
      # foundation resources — it will run even if AI phases failed.
      - name: "Bicep Phase 4 — Function Apps"
        id: deploy_bicep_function_apps
        if: always() && needs.validate.outputs.is_dry_run != 'true' && steps.arm_validate.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          FOUNDATION_OUTCOME: ${{ steps.deploy_foundation.outcome }}
        run: |
          if [[ "$FOUNDATION_OUTCOME" != "success" ]]; then
            echo "⏭️  Phase 4 (Function Apps) — no action: Phase 1 (Foundation) did not succeed (outcome: $FOUNDATION_OUTCOME)" | tee -a orchestrator-output.log
            exit 0
          fi
          set +e
          python3 deployment/deploy.py deploy-bicep-function-apps \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --location-ml "${{ steps.region_select.outputs.ml_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Store Function App client IDs in Key Vault ────────────────────────
      # After Phase 4 provisions the Function Apps and their User-Assigned
      # Managed Identities, this step fetches each identity's clientId via
      # ManagedServiceIdentityClient (azure.mgmt.msi) and stores it in the
      # Phase 1 Key Vault as a secret named "clientid-{app}-{env}".
      # Code repositories retrieve their own AZURE_CLIENT_ID from Key Vault
      # via GitHub OIDC, removing the need for manual secret management.
      - name: Store Function App client IDs in Key Vault
        id: store_client_ids
        if: >-
          needs.validate.outputs.is_dry_run != 'true' &&
          steps.deploy_bicep_function_apps.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py fetch-identity-client-ids \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Phase 5 — Governance (policy assignments / cost budget) ─────────────
      # Independent of all other phases — always runs (resources are conditional
      # on enableGovernancePolicies and monthlyBudgetAmount template parameters).
      - name: "Bicep Phase 5 — Governance"
        id: deploy_governance
        if: needs.validate.outputs.is_dry_run != 'true' && steps.arm_validate.outcome == 'success'
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py deploy-bicep-governance \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Synthesize overall Bicep deployment status (backward-compat step ID) ─
      # Downstream steps gate on `steps.deploy_bicep.outcome == 'success'`.
      # This step evaluates the outcomes of all 5 phases and exits zero only when
      # every phase that ran (non-skipped) succeeded.
      - name: "Bicep Infrastructure Complete"
        id: deploy_bicep
        if: always()
        continue-on-error: true
        run: |
          FAILED=0
          for OUTCOME in \
            "${{ steps.deploy_foundation.outcome }}" \
            "${{ steps.deploy_ai_services.outcome }}" \
            "${{ steps.deploy_ai_apps.outcome }}" \
            "${{ steps.deploy_bicep_function_apps.outcome }}" \
            "${{ steps.deploy_governance.outcome }}"; do
            [[ "$OUTCOME" == "failure" ]] && ((FAILED++)) || true
          done
          if [[ $FAILED -gt 0 ]]; then
            echo "❌ $FAILED Bicep phase(s) failed — check individual phase steps above"
            exit 1
          fi
          echo "✅ All Bicep phases completed successfully"

      # ── Signal code repositories (repository_dispatch) ────────────────────
      # When Phase 4 (Function Apps) succeeds, dispatch an ``infra_provisioned``
      # event to each code repository so that code deployments start
      # automatically without manual triggering.  The payload includes the
      # environment name and the Key Vault URL where each repo can look up its
      # own AZURE_CLIENT_ID secret (clientid-{app_name}-{environment}).
      #
      # Requires: DEPLOY_DISPATCH_TOKEN secret — a GitHub PAT with `repo` scope
      # on each target repository (or a GitHub App installation token).
      - name: Signal code repositories (infra_provisioned)
        id: dispatch_code_repos
        if: >-
          needs.validate.outputs.is_dry_run != 'true' &&
          steps.deploy_bicep_function_apps.outcome == 'success'
        continue-on-error: true
        env:
          DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          ENVIRONMENT: ${{ needs.validate.outputs.environment }}
          RESOURCE_GROUP: ${{ needs.validate.outputs.resource_group }}
          ORG: ASISaga
        run: |
          if [[ -z "$DISPATCH_TOKEN" ]]; then
            echo "⏭️  DEPLOY_DISPATCH_TOKEN not set — skipping repository_dispatch"
            echo "   To enable automatic code deployments, add a GitHub PAT with repo scope as DEPLOY_DISPATCH_TOKEN."
            exit 0
          fi

          # Resolve Key Vault URL from the provisioned resource group.
          KV_URL=$(python3 deployment/orchestrator/cli/azure_ops.py list-keyvaults \
            --resource-group "$RESOURCE_GROUP" \
            --subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --output uri 2>/dev/null || echo "")

          PAYLOAD=$(cat <<EOF
          {
            "environment": "${ENVIRONMENT}",
            "resource_group": "${RESOURCE_GROUP}",
            "key_vault_url": "${KV_URL}",
            "infra_sha": "${{ github.sha }}",
            "infra_run_id": "${{ github.run_id }}"
          }
          EOF
          )

          # Repositories to notify — platform services and MCP server modules.
          REPOS=(
            "agent-operating-system"
            "aos-realm-of-agents"
            "business-infinity"
            "mcp"
            "erpnext.asisaga.com"
            "linkedin.asisaga.com"
            "reddit.asisaga.com"
            "subconscious.asisaga.com"
          )

          for REPO in "${REPOS[@]}"; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${ORG}/${REPO}/dispatches" \
              -d "{\"event_type\": \"infra_provisioned\", \"client_payload\": ${PAYLOAD}}")

            if [[ "$HTTP_STATUS" == "204" ]]; then
              echo "  ✅ Dispatched infra_provisioned to ${ORG}/${REPO}"
            else
              echo "  ⚠️  Dispatch to ${ORG}/${REPO} returned HTTP ${HTTP_STATUS} (repo may not exist or token lacks access)"
            fi
          done

      # ── Post-Deploy Health Check (deploy mode, unless skipped) ──────
      - name: Post-Deploy Health Check
        id: health_check
        if: >-
          needs.validate.outputs.is_dry_run != 'true' &&
          steps.deploy_bicep.outcome == 'success' &&
          inputs.skip_health_checks != true
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py health-check \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Pipeline step 7 — Deploy Python Function Apps ─────────────────────
      - name: Deploy Python Function Apps
        id: deploy_function_apps
        if: >-
          needs.validate.outputs.is_dry_run != 'true' &&
          steps.deploy_bicep.outcome == 'success' &&
          inputs.deploy_function_apps == true
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py deploy-function-apps \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Pipeline step 8 — Sync Kernel Configuration ───────────────────────
      - name: Sync Kernel Configuration
        id: sync_kernel_config
        if: >-
          needs.validate.outputs.is_dry_run != 'true' &&
          steps.deploy_bicep.outcome == 'success' &&
          inputs.sync_kernel_config == true
        continue-on-error: true
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set +e
          python3 deployment/deploy.py sync-kernel-config \
            --resource-group "${{ needs.validate.outputs.resource_group }}" \
            --location "${{ steps.region_select.outputs.primary_region }}" \
            --environment "${{ needs.validate.outputs.environment }}" \
            --template "${{ inputs.template || 'deployment/main-modular.bicep' }}" \
            --allow-warnings \
            --git-sha "${{ github.sha }}" \
            2>&1 | tee -a orchestrator-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          exit $EXIT_CODE

      # ── Collect overall pipeline status ───────────────────────────────────
      - name: Collect pipeline status
        id: orchestrator
        if: always()
        continue-on-error: true
        run: |
          IS_DRY_RUN="${{ needs.validate.outputs.is_dry_run }}"
          FAILED_STEPS=()

          # Resource group creation is required for every pipeline mode.
          [[ "${{ steps.ensure_rg.outcome }}" == "failure" ]] && FAILED_STEPS+=("ensure-rg")

          if [[ "$IS_DRY_RUN" == "true" ]]; then
            # Plan mode: what-if must succeed.
            [[ "${{ steps.what_if.outcome }}" == "failure" ]] && FAILED_STEPS+=("what-if")
          else
            # Deploy mode: track per-phase failures for the Bicep infrastructure.
            [[ "${{ steps.what_if.outcome }}"              == "failure" ]] && FAILED_STEPS+=("what-if")
            [[ "${{ steps.deploy_foundation.outcome }}"    == "failure" ]] && FAILED_STEPS+=("deploy-bicep-foundation")
            [[ "${{ steps.deploy_ai_services.outcome }}"   == "failure" ]] && FAILED_STEPS+=("deploy-bicep-ai-services")
            [[ "${{ steps.deploy_ai_apps.outcome }}"       == "failure" ]] && FAILED_STEPS+=("deploy-bicep-ai-apps")
            [[ "${{ steps.deploy_bicep_function_apps.outcome }}" == "failure" ]] && FAILED_STEPS+=("deploy-bicep-function-apps")
            [[ "${{ steps.deploy_governance.outcome }}"    == "failure" ]] && FAILED_STEPS+=("deploy-bicep-governance")
            # Python infrastructure steps fail the pipeline only when they were requested.
            if [[ "${{ inputs.deploy_function_apps }}" == "true" ]]; then
              [[ "${{ steps.deploy_function_apps.outcome }}" == "failure" ]] && FAILED_STEPS+=("deploy-function-apps")
            fi
            if [[ "${{ inputs.sync_kernel_config }}" == "true" ]]; then
              [[ "${{ steps.sync_kernel_config.outcome }}" == "failure" ]] && FAILED_STEPS+=("sync-kernel-config")
            fi
          fi

          if [[ ${#FAILED_STEPS[@]} -gt 0 ]]; then
            echo "❌ Failed pipeline step(s): ${FAILED_STEPS[*]}"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            echo "output_file=orchestrator-output.log" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "exit_code=0" >> "$GITHUB_OUTPUT"
          echo "output_file=orchestrator-output.log" >> "$GITHUB_OUTPUT"

      - name: Analyze orchestrator output
        id: analyze
        if: always()
        run: |
          python3 deployment/orchestrator/cli/workflow_helper.py analyze-output \
            --log-file "${{ steps.orchestrator.outputs.output_file || 'orchestrator-output.log' }}" \
            --exit-code "${{ steps.orchestrator.outputs.exit_code || '1' }}"

      - name: Extract deployment summary
        id: summary
        if: always()
        run: |
          python3 deployment/orchestrator/cli/workflow_helper.py extract-summary \
            --audit-dir deployment/audit

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-audit-${{ github.run_id }}
          path: |
            deployment/audit/*.json
            orchestrator-*.log
          retention-days: 90
          if-no-files-found: ignore

      - name: Deployment result
        if: always()
        run: |
          STATUS="${{ steps.orchestrator.outcome }}"
          FAILURE_TYPE="${{ steps.analyze.outputs.failure_type }}"
          IS_DRY_RUN="${{ needs.validate.outputs.is_dry_run }}"
          WHAT_IF_CREATES="${{ steps.summary.outputs.what_if_creates }}"
          WHAT_IF_NO_CHANGES="${{ steps.summary.outputs.what_if_no_changes }}"
          WHAT_IF_MODIFIES="${{ steps.summary.outputs.what_if_modifies }}"
          WHAT_IF_DELETES="${{ steps.summary.outputs.what_if_deletes }}"

          echo "## 🚀 Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$STATUS" == "success" ]]; then
            echo "### ✅ Deployment Succeeded" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "$IS_DRY_RUN" == "true" ]]; then
            echo "### 📋 Plan Completed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ❌ Deployment Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Failure type**: \`${FAILURE_TYPE}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            case "$FAILURE_TYPE" in
              permissions)
                echo "#### 🔑 Action Required: RBAC Permissions" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "The deployment service principal lacks \`Microsoft.Authorization/roleAssignments/write\`." >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "**Fix**: Grant the service principal **User Access Administrator** or **Owner** on \`${{ needs.validate.outputs.resource_group }}\`:" >> "$GITHUB_STEP_SUMMARY"
                echo '```bash' >> "$GITHUB_STEP_SUMMARY"
                echo "az role assignment create \\" >> "$GITHUB_STEP_SUMMARY"
                echo "  --assignee \"\$AZURE_CLIENT_ID\" \\" >> "$GITHUB_STEP_SUMMARY"
                echo "  --role \"User Access Administrator\" \\" >> "$GITHUB_STEP_SUMMARY"
                echo "  --resource-group \"${{ needs.validate.outputs.resource_group }}\"" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                ;;
              logic)
                echo "#### 🐛 Action Required: Template/Code Error" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "A Bicep template or Python orchestrator error was detected." >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "**Fix**: Review the orchestrator log artifact for the specific error, fix the template or parameters, and re-run." >> "$GITHUB_STEP_SUMMARY"
                ;;
              environmental)
                echo "#### 🌐 Action Required: Transient Azure Error" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "An Azure platform error occurred (throttling, timeout, service outage)." >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "**Fix**: Wait a few minutes and re-run. Check [Azure Status](https://status.azure.com) if the issue persists." >> "$GITHUB_STEP_SUMMARY"
                ;;
              *)
                echo "#### ⚠️ Review the orchestrator log artifact for details." >> "$GITHUB_STEP_SUMMARY"
                ;;
            esac
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ needs.validate.outputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ needs.validate.outputs.resource_group }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Primary Region | \`${{ steps.region_select.outputs.primary_region }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ML Region | \`${{ steps.region_select.outputs.ml_region }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | ${{ needs.validate.outputs.is_dry_run == 'true' && 'Plan (dry-run)' || 'Deploy' }} |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🔢 Pipeline Step Status" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          step_icon() {
            case "$1" in
              success) echo "✅ success" ;;
              failure) echo "❌ failed"  ;;
              skipped) echo "⏭️ skipped" ;;
              *)       echo "⬜ not run" ;;
            esac
          }
          echo "| Resource Group    | $(step_icon "${{ steps.ensure_rg.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint              | $(step_icon "${{ steps.lint.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Validate          | $(step_icon "${{ steps.arm_validate.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| What-If           | $(step_icon "${{ steps.what_if.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Phase 1** — Foundation       | $(step_icon "${{ steps.deploy_foundation.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Phase 2** — AI Services      | $(step_icon "${{ steps.deploy_ai_services.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Phase 3** — AI Applications  | $(step_icon "${{ steps.deploy_ai_apps.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Phase 4** — Function Apps    | $(step_icon "${{ steps.deploy_bicep_function_apps.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Phase 5** — Governance       | $(step_icon "${{ steps.deploy_governance.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Store client IDs in KV        | $(step_icon "${{ steps.store_client_ids.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Signal code repos (dispatch)  | $(step_icon "${{ steps.dispatch_code_repos.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health Check      | $(step_icon "${{ steps.health_check.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Function Apps     | $(step_icon "${{ steps.deploy_function_apps.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kernel Config     | $(step_icon "${{ steps.sync_kernel_config.outcome }}") |" >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "$WHAT_IF_CREATES" ]] && [[ "$WHAT_IF_CREATES" != "0" || "$WHAT_IF_NO_CHANGES" != "0" || "$WHAT_IF_MODIFIES" != "0" || "$WHAT_IF_DELETES" != "0" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### 📊 Resource Changes (What-If)" >> "$GITHUB_STEP_SUMMARY"
            echo "| Action | Count |" >> "$GITHUB_STEP_SUMMARY"
            echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| ✅ Create | ${WHAT_IF_CREATES:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 📦 No change | ${WHAT_IF_NO_CHANGES:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 🔄 Modify | ${WHAT_IF_MODIFIES:-0} |" >> "$GITHUB_STEP_SUMMARY"
            echo "| 🗑️ Delete | ${WHAT_IF_DELETES:-0} |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ============================================================================
  # RESOURCE INVENTORY — Show what was provisioned and where code deploys
  # ============================================================================
  resource-inventory:
    name: Resource Inventory
    needs: [validate, deploy]
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ needs.validate.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Azure Login (OIDC)
        id: login
        continue-on-error: true
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: List provisioned resources
        id: inventory
        continue-on-error: true
        run: |
          RG="${{ needs.validate.outputs.resource_group }}"
          AZURE_OPS="python3 deployment/orchestrator/cli/azure_ops.py --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }}"

          echo "## 📦 Provisioned Resource Inventory" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          RG_EXISTS=$($AZURE_OPS resource-group-exists --resource-group "$RG" 2>/dev/null || echo "false")
          if [[ "$RG_EXISTS" != "true" ]]; then
            echo "Resource group \`$RG\` does not exist yet. Run the deployment first." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          RESOURCES=$($AZURE_OPS list-resources --resource-group "$RG" --output markdown 2>/dev/null || echo "[]")

          if [[ "$RESOURCES" == "[]" ]]; then
            echo "No resources found in \`$RG\`." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "### Resources in \`$RG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Type | Location | Bicep Module |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|----------|-------------|" >> "$GITHUB_STEP_SUMMARY"

          echo "$RESOURCES" | python3 deployment/orchestrator/cli/resource_mapper.py >> "$GITHUB_STEP_SUMMARY"

      - name: Code repository deployment guide
        if: always()
        run: |
          ENV="${{ needs.validate.outputs.environment }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 🗺️ Code Repository → Azure Deployment Target" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Each deployable repository gets a dedicated Azure Function App created by \`modules/functionapp.bicep\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Function Apps follow the naming pattern: \`func-{appName}-${ENV}-{uniqueSuffix}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Platform Services (Function Apps)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | Azure Function App | Custom Domain |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-------------------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| [agent-operating-system](https://github.com/ASISaga/agent-operating-system) | \`func-agent-operating-system-${ENV}-*\` | \`agent-operating-system.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [aos-realm-of-agents](https://github.com/ASISaga/aos-realm-of-agents) | \`func-aos-realm-of-agents-${ENV}-*\` | \`aos-realm-of-agents.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [business-infinity](https://github.com/ASISaga/business-infinity) | \`func-business-infinity-${ENV}-*\` | \`business-infinity.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Note**: \`aos-kernel\`, \`aos-intelligence\`, \`aos-client-sdk\`, and \`aos-dispatcher\` are code-only Python library repositories — they have no dedicated Function Apps and are imported at runtime by \`agent-operating-system\`." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### MCP Server Modules (Function Apps)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | Azure Function App | Custom Domain |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-------------------|---------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| [erpnext.asisaga.com](https://github.com/ASISaga/erpnext.asisaga.com) | \`func-mcp-erpnext-${ENV}-*\` | \`erpnext.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [linkedin.asisaga.com](https://github.com/ASISaga/linkedin.asisaga.com) | \`func-mcp-linkedin-${ENV}-*\` | \`linkedin.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [reddit.asisaga.com](https://github.com/ASISaga/reddit.asisaga.com) | \`func-mcp-reddit-${ENV}-*\` | \`reddit.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [subconscious.asisaga.com](https://github.com/ASISaga/subconscious.asisaga.com) | \`func-mcp-subconscious-${ENV}-*\` | \`subconscious.asisaga.com\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### C-Suite Agents (Foundry Endpoints)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "C-suite agents deploy to Azure AI Foundry via \`modules/foundry-app.bicep\`, not as Function Apps." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | Foundry Endpoint | Bicep Module |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|-----------------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| [ceo-agent](https://github.com/ASISaga/ceo-agent) | \`ceo-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cfo-agent](https://github.com/ASISaga/cfo-agent) | \`cfo-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cto-agent](https://github.com/ASISaga/cto-agent) | \`cto-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cso-agent](https://github.com/ASISaga/cso-agent) | \`cso-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| [cmo-agent](https://github.com/ASISaga/cmo-agent) | \`cmo-agent\` | \`modules/foundry-app.bicep\` + \`modules/lora-inference.bicep\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Shared Infrastructure (Bicep modules, no separate code repo)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bicep Module | Resources Created | Purpose |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-------------------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/monitoring.bicep\` | Log Analytics workspace, Application Insights | Centralized logging & telemetry |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/storage.bicep\` | Storage Account | Function App backing store & deployment packages |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/servicebus.bicep\` | Service Bus namespace + queue | Orchestration messaging between agents |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/keyvault.bicep\` | Key Vault | Secrets management |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-services.bicep\` | Azure AI Services (Cognitive) | LLM and cognitive API access |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-hub.bicep\` | Azure AI Foundry Hub | ML workspace hub for agent models |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-project.bicep\` | Azure AI Foundry Project | Agent project workspace |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/ai-gateway.bicep\` | API Management | Rate limiting, JWT validation, AI gateway |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/model-registry.bicep\` | Model Registry | LoRA adapter storage |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/a2a-connections.bicep\` | A2A connections | Agent-to-Agent boardroom orchestration |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/policy.bicep\` | Azure Policy assignments | Governance: location, HTTPS, KV soft-delete |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`modules/budget.bicep\` | Cost Management budget | Monthly spend alerts |" >> "$GITHUB_STEP_SUMMARY"
