name: Infrastructure Deployment
# Legacy entry-point retained for backwards-compatibility.
# Delegates to orchestrator-full-stack.yml which chains the five Bicep phases.
# New callers should invoke orchestrator-full-stack.yml directly.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      resource_group:
        description: 'Azure resource group name (leave blank for default rg-aos-<env>)'
        required: false
        type: string
      location:
        description: 'Primary Azure region (auto-selected if empty)'
        required: false
        type: string
        default: ''
      geography:
        description: 'Geographic preference for auto-region selection (used when location is empty)'
        required: false
        type: choice
        options:
          - ''
          - americas
          - europe
          - asia
        default: ''
      template:
        description: 'Bicep template file path'
        required: false
        type: string
        default: 'deployment/main-modular.bicep'
      dry_run:
        description: 'Plan only — no actual changes (lint → validate → what-if)'
        required: false
        type: boolean
        default: false
      skip_health_checks:
        description: 'Skip post-deployment health checks'
        required: false
        type: boolean
        default: false
      deploy_function_apps:
        description: 'Deploy Python Function Apps via SDK bridge after Bicep (requires aos-client-sdk)'
        required: false
        type: boolean
        default: false
      sync_kernel_config:
        description: 'Sync AOS kernel env vars to all Function Apps after deployment'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  # Required to dispatch repository_dispatch events to code repositories
  # (via DEPLOY_DISPATCH_TOKEN secret — a PAT with repo scope)
  actions: write

jobs:
  # Delegate all work to the full-stack orchestrator.
  # Each Bicep phase runs in its own reusable workflow; the orchestrator
  # chains them with correct dependency order and handles post-deploy tasks.
  orchestrate:
    uses: ./.github/workflows/orchestrator-full-stack.yml
    with:
      environment:          ${{ inputs.environment }}
      resource_group:       ${{ inputs.resource_group }}
      location:             ${{ inputs.location }}
      geography:            ${{ inputs.geography }}
      template:             ${{ inputs.template || 'deployment/main-modular.bicep' }}
      dry_run:              ${{ inputs.dry_run == true }}
      skip_health_checks:   ${{ inputs.skip_health_checks == true }}
      deploy_function_apps: ${{ inputs.deploy_function_apps == true }}
      sync_kernel_config:   ${{ inputs.sync_kernel_config == true }}
    secrets: inherit

# =============================================================================
# The monolithic validate + deploy + resource-inventory jobs that previously
# lived in this file have been extracted into focused reusable workflows:
#
#   .github/workflows/infra-foundation.yml   — Phase 1 (monitoring/storage/sb/kv)
#   .github/workflows/infra-ai-services.yml  — Phase 2 & 3 (AI Services + Apps)
#   .github/workflows/infra-compute.yml      — Phase 4 (Function Apps)
#   .github/workflows/infra-governance.yml   — Phase 5 (policy/budget)
#   .github/workflows/orchestrator-full-stack.yml — full chain + finalize
#
# Each phase workflow supports both workflow_call (for chaining) and
# workflow_dispatch (for standalone manual runs).
