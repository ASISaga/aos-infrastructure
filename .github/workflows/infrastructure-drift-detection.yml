name: Infrastructure Drift Detection

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      resource_group:
        description: 'Resource group name (leave blank for default rg-aos-<env>)'
        required: false
        default: ''
      template:
        description: 'Bicep template to compare against (relative to repo root)'
        required: false
        default: 'deployment/main-modular.bicep'
      parameters_file:
        description: 'Bicep parameter file (relative to repo root)'
        required: false
        default: ''
      check_dr_readiness:
        description: 'Assess disaster-recovery readiness (KV soft-delete, geo-replication)'
        required: false
        default: 'true'
        type: boolean
      fail_on_drift:
        description: 'Fail the workflow when drift is detected'
        required: false
        default: 'false'
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  drift-detection:
    name: 'Drift Detection — ${{ inputs.environment || ''dev'' }}'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r deployment/orchestrator/requirements.txt

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve inputs
        id: resolve
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          RG="${{ inputs.resource_group }}"
          [ -z "$RG" ] && RG="rg-aos-${ENV}"
          TEMPLATE="${{ inputs.template || 'deployment/main-modular.bicep' }}"
          PARAMS="${{ inputs.parameters_file }}"
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"
          echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"
          echo "parameters_file=$PARAMS" >> "$GITHUB_OUTPUT"

      - name: Install Azure Bicep
        run: az bicep install

      - name: Snapshot live state
        id: snapshot
        run: |
          python - <<'EOF'
          import sys, json
          sys.path.insert(0, 'deployment/orchestrator')
          from reliability.drift_detector import DriftDetector
          dd = DriftDetector('${{ steps.resolve.outputs.resource_group }}')
          snapshot = dd.snapshot_state()
          print(f"Snapshot: {len(snapshot)} resources")
          EOF

      - name: Detect infrastructure drift
        id: drift
        run: |
          python - <<'EOF'
          import sys, json
          sys.path.insert(0, 'deployment/orchestrator')
          from reliability.drift_detector import DriftDetector, DriftKind
          dd = DriftDetector('${{ steps.resolve.outputs.resource_group }}')
          template = '${{ steps.resolve.outputs.template }}'
          params = '${{ steps.resolve.outputs.parameters_file }}'
          findings = dd.detect_drift(template, params)
          counts = {k.value: 0 for k in DriftKind}
          for f in findings:
              counts[f.kind.value] += 1
          print(f"Drift findings: {len(findings)} total — "
                f"{counts['missing']} missing, {counts['unexpected']} unexpected, "
                f"{counts['changed']} changed")
          with open('drift-findings.json', 'w') as fh:
              json.dump([f.to_dict() for f in findings], fh, indent=2)
          if findings and '${{ inputs.fail_on_drift }}' == 'true':
              sys.exit(1)
          EOF

      - name: SLA compliance check
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment/orchestrator')
          from reliability.health_monitor import HealthMonitor
          hm = HealthMonitor('${{ steps.resolve.outputs.resource_group }}', '${{ steps.resolve.outputs.environment }}')
          sla = hm.check_sla_compliance()
          if not sla['compliant']:
              print(f"::warning::SLA compliance: {sla['observed_uptime']:.2f}% < target {sla['sla_target']}%")
          EOF

      - name: DR readiness assessment
        if: ${{ inputs.check_dr_readiness == 'true' || inputs.check_dr_readiness == true }}
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment/orchestrator')
          from reliability.health_monitor import HealthMonitor
          hm = HealthMonitor('${{ steps.resolve.outputs.resource_group }}', '${{ steps.resolve.outputs.environment }}')
          dr = hm.check_disaster_recovery_readiness()
          if not dr['ready']:
              for finding in dr['findings']:
                  print(f"::warning::DR: {finding}")
          EOF

      - name: Upload drift findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-findings-${{ steps.resolve.outputs.environment }}
          path: drift-findings.json
          if-no-files-found: ignore

      - name: Drift detection summary
        if: always()
        run: |
          echo "## 🔍 Drift Detection Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ steps.resolve.outputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ steps.resolve.outputs.resource_group }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Drift detection | ✅ completed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SLA compliance | ✅ checked |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DR readiness | ${{ (inputs.check_dr_readiness == 'true' || inputs.check_dr_readiness == true) && '✅ assessed' || '⏭️ skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
