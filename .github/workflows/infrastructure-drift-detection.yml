name: Infrastructure Drift Detection

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      resource_group:
        description: 'Resource group name (leave blank for default rg-aos-<env>)'
        required: false
        default: ''
      template:
        description: 'Bicep template to compare against (relative to repo root)'
        required: false
        default: 'deployment/main-modular.bicep'
      parameters_file:
        description: 'Bicep parameter file (relative to repo root)'
        required: false
        default: ''
      check_dr_readiness:
        description: 'Assess disaster-recovery readiness (KV soft-delete, geo-replication)'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  drift-detection:
    name: 'Drift Detection — ${{ inputs.environment }}'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Azure login
        id: login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve inputs
        id: resolve
        run: |
          ENV="${{ inputs.environment }}"
          RG="${{ inputs.resource_group }}"
          [ -z "$RG" ] && RG="rg-aos-${ENV}"
          TEMPLATE="${{ inputs.template || 'deployment/main-modular.bicep' }}"
          PARAMS="${{ inputs.parameters_file }}"
          echo "environment=$ENV"        >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG"      >> "$GITHUB_OUTPUT"
          echo "template=$TEMPLATE"      >> "$GITHUB_OUTPUT"
          echo "parameters_file=$PARAMS" >> "$GITHUB_OUTPUT"

      - name: Install Azure Bicep
        run: az bicep install

      - name: Snapshot live state
        id: snapshot
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys, json
          sys.path.insert(0, 'deployment')
          from orchestrator.reliability.drift_detector import DriftDetector
          dd = DriftDetector('${{ steps.resolve.outputs.resource_group }}')
          snapshot = dd.snapshot_state()
          print(f"Snapshot: {len(snapshot)} resources")
          EOF

      - name: Detect infrastructure drift
        id: drift
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys, json
          sys.path.insert(0, 'deployment')
          from orchestrator.reliability.drift_detector import DriftDetector, DriftKind
          dd = DriftDetector('${{ steps.resolve.outputs.resource_group }}')
          template = '${{ steps.resolve.outputs.template }}'
          params = '${{ steps.resolve.outputs.parameters_file }}'
          findings = dd.detect_drift(template, params)
          counts = {k.value: 0 for k in DriftKind}
          for f in findings:
              counts[f.kind.value] += 1
          print(f"Drift findings: {len(findings)} total — "
                f"{counts['missing']} missing, {counts['unexpected']} unexpected, "
                f"{counts['changed']} changed")
          with open('drift-findings.json', 'w') as fh:
              json.dump([f.to_dict() for f in findings], fh, indent=2)
          EOF

      - name: SLA compliance check
        id: sla
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment')
          from orchestrator.reliability.health_monitor import HealthMonitor
          hm = HealthMonitor('${{ steps.resolve.outputs.resource_group }}', '${{ steps.resolve.outputs.environment }}')
          sla = hm.check_sla_compliance()
          if not sla['compliant']:
              print(f"::warning::SLA compliance: {sla['observed_uptime']:.2f}% < target {sla['sla_target']}%")
          EOF

      - name: DR readiness assessment
        id: dr
        if: inputs.check_dr_readiness == true
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment')
          from orchestrator.reliability.health_monitor import HealthMonitor
          hm = HealthMonitor('${{ steps.resolve.outputs.resource_group }}', '${{ steps.resolve.outputs.environment }}')
          dr = hm.check_disaster_recovery_readiness()
          if not dr['ready']:
              for finding in dr['findings']:
                  print(f"::warning::DR: {finding}")
          EOF

      - name: Source control drift check
        id: sc_drift
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ steps.resolve.outputs.resource_group }}"
          AZURE_OPS="python3 deployment/orchestrator/cli/azure_ops.py --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          FUNCTION_APPS=$($AZURE_OPS list-function-apps --resource-group "$RESOURCE_GROUP" --output names 2>/dev/null || echo "")

          if [[ -n "$FUNCTION_APPS" ]]; then
            while IFS= read -r APP; do
              [[ -z "$APP" ]] && continue
              SC_URL=$($AZURE_OPS show-source-control --resource-group "$RESOURCE_GROUP" --name "$APP" 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('repoUrl',''))" 2>/dev/null || echo "")
              if [[ -z "$SC_URL" ]]; then
                echo "::warning::Drift: Microsoft.Web/sites/sourcecontrols missing on Function App: $APP"
              else
                echo "  $APP: source control → $SC_URL"
              fi
            done <<< "$FUNCTION_APPS"
          fi

      - name: Upload drift findings
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: drift-findings-${{ steps.resolve.outputs.environment }}
          path: drift-findings.json
          if-no-files-found: ignore

      - name: Drift detection summary
        if: always()
        run: |
          echo "## 🔍 Drift Detection Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status | Guidance |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ steps.resolve.outputs.environment }}\` | |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ steps.resolve.outputs.resource_group }}\` | |" >> "$GITHUB_STEP_SUMMARY"

          # Snapshot
          if [[ "${{ steps.snapshot.outcome }}" == "success" ]]; then
            echo "| Live state snapshot | ✅ captured | |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Live state snapshot | ❌ failed | Ensure Azure login succeeded and the resource group exists. Run deployment workflow first if needed. |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Drift
          if [[ "${{ steps.drift.outcome }}" == "success" ]]; then
            echo "| Drift detection | ✅ completed | Download \`drift-findings.json\` artifact for details. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Drift detection | ❌ failed | Check the Bicep template path and that the resource group has been deployed. |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # SLA
          if [[ "${{ steps.sla.outcome }}" == "success" ]]; then
            echo "| SLA compliance | ✅ checked | |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| SLA compliance | ❌ failed | SLA check requires Application Insights with uptime data. Deploy monitoring resources first. |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # DR
          if [[ "${{ steps.dr.outcome }}" == "success" ]]; then
            echo "| DR readiness | ✅ assessed | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.dr.outcome }}" == "failure" ]]; then
            echo "| DR readiness | ❌ failed | Ensure Key Vaults have soft-delete enabled and storage accounts have geo-replication. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| DR readiness | ⏭️ skipped | |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Source control drift
          if [[ "${{ steps.sc_drift.outcome }}" == "success" ]]; then
            echo "| Source control drift (sites/sourcecontrols) | ✅ checked | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.sc_drift.outcome }}" == "failure" ]]; then
            echo "| Source control drift (sites/sourcecontrols) | ❌ failed | One or more Function Apps are missing \`Microsoft.Web/sites/sourcecontrols\`. Re-run the deployment workflow. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Source control drift (sites/sourcecontrols) | ⏭️ skipped | |" >> "$GITHUB_STEP_SUMMARY"
          fi
