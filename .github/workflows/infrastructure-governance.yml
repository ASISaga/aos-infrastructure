name: Infrastructure Governance

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      resource_group:
        description: 'Resource group name (leave blank for default rg-aos-<env>)'
        required: false
        default: ''
      enforce_policies:
        description: 'Assign AOS governance policies'
        required: false
        default: false
        type: boolean
      check_budget:
        description: 'Check budget status and alerts'
        required: false
        default: true
        type: boolean
      review_rbac:
        description: 'Run privileged-access review'
        required: false
        default: true
        type: boolean
      required_tags:
        description: 'Comma-separated key=value tag pairs to enforce (e.g. environment=dev,team=platform)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  governance:
    name: 'Governance — ${{ inputs.environment }}'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Azure login
        id: login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve inputs
        id: resolve
        run: |
          ENV="${{ inputs.environment }}"
          RG="${{ inputs.resource_group }}"
          [ -z "$RG" ] && RG="rg-aos-${ENV}"
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"

      - name: Policy compliance evaluation
        id: policy
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys, json
          sys.path.insert(0, 'deployment')
          from orchestrator.governance.policy_manager import PolicyManager
          pm = PolicyManager('${{ steps.resolve.outputs.resource_group }}', '${{ secrets.AZURE_SUBSCRIPTION_ID }}')
          summary = pm.evaluate_compliance()
          print(json.dumps(summary, indent=2))
          if summary['non_compliant'] > 0:
              print(f"::warning::Policy: {summary['non_compliant']} non-compliant resource(s)")
          EOF

      - name: Required tag enforcement
        id: tags
        if: inputs.required_tags != ''
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment')
          from orchestrator.governance.policy_manager import PolicyManager
          tags_raw = '${{ inputs.required_tags }}'
          tags = dict(pair.split('=', 1) for pair in tags_raw.split(',') if '=' in pair)
          if tags:
              pm = PolicyManager('${{ steps.resolve.outputs.resource_group }}', '${{ secrets.AZURE_SUBSCRIPTION_ID }}')
              missing = pm.enforce_required_tags(tags)
              for tag_key, resources in missing.items():
                  if resources:
                      print(f"::warning::Missing tag '{tag_key}' on: {', '.join(resources)}")
          EOF

      - name: Budget status check
        id: budget
        if: inputs.check_budget == true
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment')
          from orchestrator.governance.cost_manager import CostManager
          cm = CostManager('${{ steps.resolve.outputs.resource_group }}', '${{ secrets.AZURE_SUBSCRIPTION_ID }}')
          alerts = cm.check_budget_alerts()
          if alerts:
              print(f"::warning::Budget alert(s): {', '.join(alerts)}")
          EOF

      - name: Privileged access review
        id: rbac
        if: inputs.review_rbac == true
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment')
          from orchestrator.governance.rbac_manager import RbacManager
          rm = RbacManager('${{ steps.resolve.outputs.resource_group }}', '${{ secrets.AZURE_SUBSCRIPTION_ID }}')
          findings = rm.review_privileged_access()
          for f in findings:
              print(f"::warning::RBAC: {f['principal']} holds '{f['role']}' — {f['recommendation']}")
          EOF

      - name: Assign AOS governance policies
        id: assign
        if: inputs.enforce_policies == true
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, 'deployment')
          from orchestrator.governance.policy_manager import PolicyManager
          pm = PolicyManager('${{ steps.resolve.outputs.resource_group }}', '${{ secrets.AZURE_SUBSCRIPTION_ID }}')
          ok = pm.assign_aos_policies('${{ steps.resolve.outputs.environment }}')
          if not ok:
              print("::warning::Some policy assignments failed — check logs above")
          EOF

      - name: Source control compliance check
        id: source_control
        continue-on-error: true
        run: |
          AZURE_OPS="python3 deployment/orchestrator/cli/azure_ops.py --subscription-id ${{ secrets.AZURE_SUBSCRIPTION_ID }}"
          FUNCTION_APPS=$($AZURE_OPS list-function-apps \
            --resource-group "${{ steps.resolve.outputs.resource_group }}" \
            --output names 2>/dev/null || echo "")

          if [[ -n "$FUNCTION_APPS" ]]; then
            while IFS= read -r APP; do
              [[ -z "$APP" ]] && continue
              SC_URL=$($AZURE_OPS show-source-control \
                --resource-group "${{ steps.resolve.outputs.resource_group }}" \
                --name "$APP" 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('repoUrl',''))" 2>/dev/null || echo "")
              if [[ -z "$SC_URL" ]]; then
                echo "::warning::Microsoft.Web/sites/sourcecontrols not configured for Function App: $APP"
              fi
            done <<< "$FUNCTION_APPS"
          fi

      - name: Governance summary
        if: always()
        run: |
          echo "## 🏛️ Governance Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status | Guidance |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ steps.resolve.outputs.environment }}\` | |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ steps.resolve.outputs.resource_group }}\` | |" >> "$GITHUB_STEP_SUMMARY"

          # Policy
          if [[ "${{ steps.policy.outcome }}" == "success" ]]; then
            echo "| Policy compliance | ✅ evaluated | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.policy.outcome }}" == "failure" ]]; then
            echo "| Policy compliance | ❌ failed | Check Azure login and ensure the service principal has \`Reader\` on the resource group. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Policy compliance | ⏭️ skipped | |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Tags
          if [[ "${{ steps.tags.outcome }}" == "success" ]]; then
            echo "| Tag enforcement | ✅ checked | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.tags.outcome }}" == "failure" ]]; then
            echo "| Tag enforcement | ❌ failed | Review the warning annotations above for missing tags. Apply tags via the Azure portal or SDK. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Tag enforcement | ⏭️ skipped | Provide \`required_tags\` input to enable. |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Budget
          if [[ "${{ steps.budget.outcome }}" == "success" ]]; then
            echo "| Budget check | ✅ checked | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.budget.outcome }}" == "failure" ]]; then
            echo "| Budget check | ❌ failed | Verify Cost Management API access. Ensure the SP has \`Cost Management Reader\` role. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Budget check | ⏭️ skipped | |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # RBAC
          if [[ "${{ steps.rbac.outcome }}" == "success" ]]; then
            echo "| RBAC review | ✅ reviewed | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.rbac.outcome }}" == "failure" ]]; then
            echo "| RBAC review | ❌ failed | Ensure the SP has \`Reader\` and \`User Access Administrator\` on the resource group. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| RBAC review | ⏭️ skipped | |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Policy assignment
          if [[ "${{ steps.assign.outcome }}" == "success" ]]; then
            echo "| Policy assignment | ✅ assigned | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.assign.outcome }}" == "failure" ]]; then
            echo "| Policy assignment | ❌ failed | Ensure the SP has \`Resource Policy Contributor\` on the subscription scope. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Policy assignment | ⏭️ skipped | Set \`enforce_policies\` to \`true\` to enable. |" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Source control compliance
          if [[ "${{ steps.source_control.outcome }}" == "success" ]]; then
            echo "| Source control (sites/sourcecontrols) | ✅ configured | |" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.source_control.outcome }}" == "failure" ]]; then
            echo "| Source control (sites/sourcecontrols) | ❌ failed | Re-run the deployment workflow to provision \`Microsoft.Web/sites/sourcecontrols\` for all Function Apps. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Source control (sites/sourcecontrols) | ⏭️ skipped | |" >> "$GITHUB_STEP_SUMMARY"
          fi
