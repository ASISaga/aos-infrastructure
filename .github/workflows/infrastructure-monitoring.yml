name: Infrastructure Monitoring

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to monitor'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      check_type:
        description: 'Type of check to perform'
        required: false
        type: choice
        options:
          - all
          - health
          - performance
          - cost
          - security
        default: all

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================================================
  # HEALTH CHECK
  # ============================================================================
  health-check:
    name: Health Check (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: inputs.check_type == 'all' || inputs.check_type == 'health'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        id: login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set resource group
        id: rg
        run: echo "resource_group=rg-aos-${{ inputs.environment }}" >> "$GITHUB_OUTPUT"

      - name: Check resource group exists
        id: rg_check
        continue-on-error: true
        run: |
          if az group show --name "${{ steps.rg.outputs.resource_group }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Function App health
        id: func_health
        if: steps.rg_check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          echo "Checking Function Apps in ${{ steps.rg.outputs.resource_group }}..."

          FUNCTION_APPS=$(az functionapp list \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --query "[].{name:name, state:state, hostName:defaultHostName}" \
            -o tsv 2>/dev/null || echo "")

          if [[ -z "$FUNCTION_APPS" ]]; then
            echo "No Function Apps found"
          else
            while IFS=$'\t' read -r NAME STATE HOSTNAME; do
              echo "  $NAME: state=$STATE"
              if [[ "$STATE" != "Running" ]]; then
                echo "  ⚠️ $NAME is not running!"
              fi
            done <<< "$FUNCTION_APPS"
          fi

      - name: Check Storage Account health
        id: storage_health
        if: steps.rg_check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          STORAGE_ACCOUNTS=$(az storage account list \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --query "[].{name:name, status:statusOfPrimary, location:primaryLocation}" \
            -o tsv 2>/dev/null || echo "")

          if [[ -z "$STORAGE_ACCOUNTS" ]]; then
            echo "No Storage Accounts found"
          else
            while IFS=$'\t' read -r NAME STATUS LOCATION; do
              echo "  $NAME: $STATUS in $LOCATION"
              if [[ "$STATUS" != "available" ]]; then
                echo "  ⚠️ $NAME is not available!"
              fi
            done <<< "$STORAGE_ACCOUNTS"
          fi

      - name: Check Service Bus health
        id: sb_health
        if: steps.rg_check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          NAMESPACES=$(az servicebus namespace list \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --query "[].{name:name, status:status}" \
            -o tsv 2>/dev/null || echo "")

          if [[ -z "$NAMESPACES" ]]; then
            echo "No Service Bus namespaces found"
          else
            while IFS=$'\t' read -r NAME STATUS; do
              echo "  $NAME: $STATUS"
              if [[ "$STATUS" != "Active" ]]; then
                echo "  ⚠️ $NAME is not active!"
              fi
            done <<< "$NAMESPACES"
          fi

      - name: Check source control configuration
        id: sc_health
        if: steps.rg_check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          FUNCTION_APPS=$(az functionapp list \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --query "[].name" \
            -o tsv 2>/dev/null || echo "")

          if [[ -z "$FUNCTION_APPS" ]]; then
            echo "No Function Apps found"
          else
            while IFS= read -r APP; do
              SC_URL=$(az webapp deployment source show \
                --resource-group "${{ steps.rg.outputs.resource_group }}" \
                --name "$APP" \
                --query "repoUrl" -o tsv 2>/dev/null || echo "")
              if [[ -n "$SC_URL" ]]; then
                echo "  $APP: source control → $SC_URL"
              else
                echo "  ⚠️ $APP: no source control (Microsoft.Web/sites/sourcecontrols) configured"
              fi
            done <<< "$FUNCTION_APPS"
          fi

      - name: Health check summary
        if: always()
        run: |
          echo "## 🩺 Health Check — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status | Guidance |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Group | \`${{ steps.rg.outputs.resource_group }}\` | |" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.rg_check.outputs.exists }}" == "false" ]]; then
            echo "| Resource group exists | ❌ not found | Run the **Infrastructure Deployment** workflow to create resources first. |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Resource group exists | ✅ | |" >> "$GITHUB_STEP_SUMMARY"

            if [[ "${{ steps.func_health.outcome }}" == "success" ]]; then
              echo "| Function Apps | ✅ healthy | |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| Function Apps | ❌ issue detected | Check Function App state in Azure portal. Restart if stopped: \`az functionapp restart -g <rg> -n <name>\` |" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [[ "${{ steps.storage_health.outcome }}" == "success" ]]; then
              echo "| Storage Accounts | ✅ healthy | |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| Storage Accounts | ❌ issue detected | Check [Azure Status](https://status.azure.com) for regional storage outages. |" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [[ "${{ steps.sb_health.outcome }}" == "success" ]]; then
              echo "| Service Bus | ✅ healthy | |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| Service Bus | ❌ issue detected | Check namespace status: \`az servicebus namespace show -g <rg> -n <name>\` |" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [[ "${{ steps.sc_health.outcome }}" == "success" ]]; then
              echo "| Source control (sites/sourcecontrols) | ✅ checked | |" >> "$GITHUB_STEP_SUMMARY"
            elif [[ "${{ steps.sc_health.outcome }}" == "failure" ]]; then
              echo "| Source control (sites/sourcecontrols) | ❌ failed | Ensure \`Microsoft.Web/sites/sourcecontrols\` is provisioned. Re-run the deployment workflow. |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| Source control (sites/sourcecontrols) | ⏭️ skipped | |" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: health-report-${{ inputs.environment }}
          path: health-report-${{ inputs.environment }}.md
          if-no-files-found: ignore
          retention-days: 90

  # ============================================================================
  # PERFORMANCE METRICS
  # ============================================================================
  performance-metrics:
    name: Performance Metrics (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: inputs.check_type == 'all' || inputs.check_type == 'performance'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Collect performance metrics
        id: perf
        continue-on-error: true
        run: |
          RESOURCE_GROUP="rg-aos-${{ inputs.environment }}"

          FUNCTION_APPS=$(az functionapp list -g "$RESOURCE_GROUP" --query "[].name" -o tsv 2>/dev/null || echo "")

          if [[ -z "$FUNCTION_APPS" ]]; then
            echo "No Function Apps found in $RESOURCE_GROUP"
            exit 0
          fi

          END_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          START_TIME=$(date -u -d '1 hour ago' +"%Y-%m-%dT%H:%M:%SZ")

          for APP in $FUNCTION_APPS; do
            RESOURCE_ID=$(az functionapp show -g "$RESOURCE_GROUP" -n "$APP" --query id -o tsv 2>/dev/null || echo "")
            [[ -z "$RESOURCE_ID" ]] && continue

            echo "Function App: $APP"
            echo "  Requests (last hour):"
            az monitor metrics list --resource "$RESOURCE_ID" --metric "Requests" \
              --start-time "$START_TIME" --end-time "$END_TIME" --aggregation Total \
              --query "value[0].timeseries[0].data[-1].total" -o tsv 2>/dev/null || echo "    N/A"
            echo "  Avg Response Time (last hour):"
            az monitor metrics list --resource "$RESOURCE_ID" --metric "AverageResponseTime" \
              --start-time "$START_TIME" --end-time "$END_TIME" --aggregation Average \
              --query "value[0].timeseries[0].data[-1].average" -o tsv 2>/dev/null || echo "    N/A"
          done

      - name: Performance summary
        if: always()
        run: |
          echo "## 📈 Performance Metrics — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.perf.outcome }}" == "success" ]]; then
            echo "✅ Performance metrics collected. See workflow logs for details." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Could not collect performance metrics." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Guidance**: Ensure the resource group \`rg-aos-${{ inputs.environment }}\` exists and contains Function Apps. Deploy infrastructure first if needed." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ============================================================================
  # COST MONITORING
  # ============================================================================
  cost-monitoring:
    name: Cost Monitoring (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: inputs.check_type == 'all' || inputs.check_type == 'cost'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Analyze costs
        id: cost
        continue-on-error: true
        run: |
          RESOURCE_GROUP="rg-aos-${{ inputs.environment }}"
          echo "Resources in $RESOURCE_GROUP:"
          az resource list -g "$RESOURCE_GROUP" --query "[].{name:name, type:type, location:location}" -o table 2>/dev/null || echo "Resource group not found"

      - name: Cost summary
        if: always()
        run: |
          echo "## 💰 Cost Monitoring — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.cost.outcome }}" == "success" ]]; then
            echo "✅ Resource inventory listed. For detailed cost analysis, visit [Azure Cost Management](https://portal.azure.com/#blade/Microsoft_Azure_CostManagement/Menu/costanalysis) in the portal." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Could not list resources." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Guidance**: Ensure the resource group exists and the service principal has \`Reader\` access." >> "$GITHUB_STEP_SUMMARY"
          fi

  # ============================================================================
  # SECURITY POSTURE
  # ============================================================================
  security-posture:
    name: Security Posture (${{ inputs.environment }})
    runs-on: ubuntu-latest
    if: inputs.check_type == 'all' || inputs.check_type == 'security'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check Key Vault security
        id: kv_security
        continue-on-error: true
        run: |
          RESOURCE_GROUP="rg-aos-${{ inputs.environment }}"
          KEY_VAULTS=$(az keyvault list -g "$RESOURCE_GROUP" --query "[].name" -o tsv 2>/dev/null || echo "")

          if [[ -z "$KEY_VAULTS" ]]; then
            echo "No Key Vaults found"
            exit 0
          fi

          for KV in $KEY_VAULTS; do
            echo "Key Vault: $KV"
            SOFT_DELETE=$(az keyvault show -n "$KV" -g "$RESOURCE_GROUP" --query "properties.enableSoftDelete" -o tsv 2>/dev/null || echo "unknown")
            PURGE_PROTECTION=$(az keyvault show -n "$KV" -g "$RESOURCE_GROUP" --query "properties.enablePurgeProtection" -o tsv 2>/dev/null || echo "unknown")
            echo "  Soft Delete: $SOFT_DELETE | Purge Protection: $PURGE_PROTECTION"
            if [[ "$SOFT_DELETE" != "true" ]] || [[ "$PURGE_PROTECTION" != "true" ]]; then
              echo "  ⚠️ Security settings need attention"
            fi
          done

      - name: Check Storage Account security
        id: sa_security
        continue-on-error: true
        run: |
          RESOURCE_GROUP="rg-aos-${{ inputs.environment }}"
          STORAGE_ACCOUNTS=$(az storage account list -g "$RESOURCE_GROUP" --query "[].name" -o tsv 2>/dev/null || echo "")

          if [[ -z "$STORAGE_ACCOUNTS" ]]; then
            echo "No Storage Accounts found"
            exit 0
          fi

          for SA in $STORAGE_ACCOUNTS; do
            HTTPS_ONLY=$(az storage account show -n "$SA" -g "$RESOURCE_GROUP" --query "enableHttpsTrafficOnly" -o tsv 2>/dev/null || echo "unknown")
            echo "  $SA: HTTPS-only=$HTTPS_ONLY"
            if [[ "$HTTPS_ONLY" != "true" ]]; then
              echo "  ⚠️ HTTPS-only should be enforced"
            fi
          done

      - name: Security summary
        if: always()
        run: |
          echo "## 🔒 Security Posture — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status | Guidance |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|----------|" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.kv_security.outcome }}" == "success" ]]; then
            echo "| Key Vault security | ✅ checked | |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Key Vault security | ❌ failed | Ensure Key Vaults exist and SP has \`Key Vault Reader\`. Enable soft-delete: \`az keyvault update -n <name> --enable-soft-delete true\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ steps.sa_security.outcome }}" == "success" ]]; then
            echo "| Storage HTTPS-only | ✅ checked | |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Storage HTTPS-only | ❌ failed | Enforce HTTPS: \`az storage account update -n <name> --https-only true\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ============================================================================
  # MONITORING SUMMARY
  # ============================================================================
  monitoring-summary:
    name: Monitoring Summary
    runs-on: ubuntu-latest
    needs: [health-check, performance-metrics, cost-monitoring, security-posture]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Infrastructure Monitoring Summary — ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health Check | ${{ needs.health-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Performance Metrics | ${{ needs.performance-metrics.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cost Monitoring | ${{ needs.cost-monitoring.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security Posture | ${{ needs.security-posture.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Provide failure guidance
          FAILURES=""
          if [[ "${{ needs.health-check.result }}" == "failure" ]]; then
            FAILURES="${FAILURES}\n- **Health Check**: Review individual step outcomes above. Common fix: ensure Azure OIDC login is configured (federated identity credential with subject \`repo:ASISaga/aos-infrastructure:environment:${{ inputs.environment }}\`)."
          fi
          if [[ "${{ needs.performance-metrics.result }}" == "failure" ]]; then
            FAILURES="${FAILURES}\n- **Performance**: Ensure Function Apps are deployed and the resource group exists."
          fi
          if [[ "${{ needs.cost-monitoring.result }}" == "failure" ]]; then
            FAILURES="${FAILURES}\n- **Cost**: Ensure the service principal has \`Reader\` access on the resource group."
          fi
          if [[ "${{ needs.security-posture.result }}" == "failure" ]]; then
            FAILURES="${FAILURES}\n- **Security**: Ensure Key Vaults and Storage Accounts exist in the resource group."
          fi

          if [[ -n "$FAILURES" ]]; then
            echo "### ⚠️ Failure Guidance" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo -e "$FAILURES" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Common root cause**: The Azure OIDC federated identity credential may not have a subject matching \`repo:ASISaga/aos-infrastructure:environment:${{ inputs.environment }}\`. Verify in Azure AD → App Registrations → Federated credentials." >> "$GITHUB_STEP_SUMMARY"
          fi
