name: Infrastructure Troubleshooting

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to troubleshoot'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      issue_type:
        description: 'Type of issue'
        required: true
        type: choice
        options:
          - deployment_failure
          - performance_degradation
          - connectivity_issue
          - resource_error
      resource_name:
        description: 'Specific resource to troubleshoot (optional)'
        required: false
        type: string
      description:
        description: 'Issue description'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  # ============================================================================
  # GENERAL DIAGNOSTICS
  # ============================================================================
  collect-diagnostics:
    name: Collect General Diagnostics
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      resource_group: ${{ steps.setup.outputs.resource_group }}
      rg_exists: ${{ steps.rg_check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        id: setup
        run: echo "resource_group=rg-aos-${{ inputs.environment }}" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        id: login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check resource group exists
        id: rg_check
        continue-on-error: true
        run: |
          if az group show --name "${{ steps.setup.outputs.resource_group }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Resource group ${{ steps.setup.outputs.resource_group }} does not exist."
          fi

      - name: Collect resource group info
        if: steps.rg_check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ steps.setup.outputs.resource_group }}"
          echo "# Resource Group Information" > diagnostics.txt
          echo "" >> diagnostics.txt
          az group show --name "$RESOURCE_GROUP" >> diagnostics.txt 2>&1
          echo "" >> diagnostics.txt
          echo "## All Resources" >> diagnostics.txt
          az resource list --resource-group "$RESOURCE_GROUP" -o table >> diagnostics.txt 2>&1

      - name: Collect deployment history
        if: steps.rg_check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ steps.setup.outputs.resource_group }}"
          echo "" >> diagnostics.txt
          echo "## Recent Failed Deployments" >> diagnostics.txt
          az deployment group list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?properties.provisioningState!='Succeeded'].{name:name, state:properties.provisioningState, timestamp:properties.timestamp}" \
            -o table >> diagnostics.txt 2>&1 || echo "No deployment history found" >> diagnostics.txt

      - name: Collect activity logs
        if: steps.rg_check.outputs.exists == 'true'
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ steps.setup.outputs.resource_group }}"
          echo "" >> diagnostics.txt
          echo "## Activity Logs (errors/warnings, last 24h)" >> diagnostics.txt
          START_TIME=$(date -u -d '24 hours ago' +"%Y-%m-%dT%H:%M:%SZ")
          az monitor activity-log list \
            --resource-group "$RESOURCE_GROUP" \
            --start-time "$START_TIME" \
            --query "[?level=='Error' || level=='Warning'].{time:eventTimestamp, level:level, operation:operationName.localizedValue, status:status.localizedValue}" \
            -o table >> diagnostics.txt 2>&1 || echo "No activity logs found" >> diagnostics.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: diagnostics-general
          path: diagnostics.txt
          if-no-files-found: ignore
          retention-days: 90

  # ============================================================================
  # DEPLOYMENT FAILURE ANALYSIS
  # ============================================================================
  analyze-deployment-failure:
    name: Analyze Deployment Failure
    runs-on: ubuntu-latest
    needs: collect-diagnostics
    if: inputs.issue_type == 'deployment_failure' && needs.collect-diagnostics.outputs.rg_exists == 'true'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Analyze failed deployments
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ needs.collect-diagnostics.outputs.resource_group }}"
          echo "# Deployment Failure Analysis" > deployment-analysis.txt

          FAILED_DEPLOYMENTS=$(az deployment group list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?properties.provisioningState=='Failed'].name" \
            -o tsv 2>/dev/null || echo "")

          if [[ -z "$FAILED_DEPLOYMENTS" ]]; then
            echo "No failed deployments found." >> deployment-analysis.txt
          else
            for DEPLOYMENT in $FAILED_DEPLOYMENTS; do
              echo "### Deployment: $DEPLOYMENT" >> deployment-analysis.txt
              az deployment group show --name "$DEPLOYMENT" --resource-group "$RESOURCE_GROUP" \
                --query "{state:properties.provisioningState, timestamp:properties.timestamp, error:properties.error}" \
                -o json >> deployment-analysis.txt 2>&1
              echo "" >> deployment-analysis.txt
            done
          fi

          echo "" >> deployment-analysis.txt
          echo "## Recommendations" >> deployment-analysis.txt
          echo "1. Review the error messages above" >> deployment-analysis.txt
          echo "2. Check regional availability of requested resources" >> deployment-analysis.txt
          echo "3. Verify subscription quotas: \`az vm list-usage --location <region> -o table\`" >> deployment-analysis.txt
          echo "4. Ensure the service principal has sufficient permissions" >> deployment-analysis.txt
          echo "5. Check parameter values in \`deployment/parameters/<env>.bicepparam\`" >> deployment-analysis.txt

      - name: Check source control configuration
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ needs.collect-diagnostics.outputs.resource_group }}"
          echo "" >> deployment-analysis.txt
          echo "## Source Control (Microsoft.Web/sites/sourcecontrols)" >> deployment-analysis.txt
          FUNCTION_APPS=$(az functionapp list -g "$RESOURCE_GROUP" --query "[].name" -o tsv 2>/dev/null || echo "")
          if [[ -n "$FUNCTION_APPS" ]]; then
            while IFS= read -r APP; do
              SC=$(az webapp deployment source show -g "$RESOURCE_GROUP" -n "$APP" -o json 2>/dev/null || echo "{}")
              echo "### $APP" >> deployment-analysis.txt
              echo "$SC" >> deployment-analysis.txt
            done <<< "$FUNCTION_APPS"
          else
            echo "No Function Apps found in resource group." >> deployment-analysis.txt
          fi

      - name: Upload analysis
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: deployment-failure-analysis
          path: deployment-analysis.txt
          if-no-files-found: ignore
          retention-days: 90

  # ============================================================================
  # PERFORMANCE DIAGNOSTICS
  # ============================================================================
  diagnose-performance:
    name: Diagnose Performance
    runs-on: ubuntu-latest
    needs: collect-diagnostics
    if: inputs.issue_type == 'performance_degradation' && needs.collect-diagnostics.outputs.rg_exists == 'true'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Collect performance diagnostics
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ needs.collect-diagnostics.outputs.resource_group }}"
          echo "# Performance Diagnostics" > performance-diagnostics.txt

          FUNCTION_APPS=$(az functionapp list -g "$RESOURCE_GROUP" --query "[].name" -o tsv 2>/dev/null || echo "")

          if [[ -n "$FUNCTION_APPS" ]]; then
            END_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            START_TIME=$(date -u -d '4 hours ago' +"%Y-%m-%dT%H:%M:%SZ")

            for APP in $FUNCTION_APPS; do
              RESOURCE_ID=$(az functionapp show -g "$RESOURCE_GROUP" -n "$APP" --query id -o tsv 2>/dev/null || echo "")
              [[ -z "$RESOURCE_ID" ]] && continue
              echo "## $APP" >> performance-diagnostics.txt
              az monitor metrics list --resource "$RESOURCE_ID" --metric "Requests" \
                --start-time "$START_TIME" --end-time "$END_TIME" --aggregation Total \
                --interval PT1H -o table >> performance-diagnostics.txt 2>&1 || echo "N/A" >> performance-diagnostics.txt
              echo "" >> performance-diagnostics.txt
            done
          else
            echo "No Function Apps found" >> performance-diagnostics.txt
          fi

          echo "" >> performance-diagnostics.txt
          echo "## Recommendations" >> performance-diagnostics.txt
          echo "1. Review Application Insights for detailed telemetry" >> performance-diagnostics.txt
          echo "2. Check for throttling or rate limiting" >> performance-diagnostics.txt
          echo "3. Consider scaling if consistent high load" >> performance-diagnostics.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: performance-diagnostics
          path: performance-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 90

  # ============================================================================
  # CONNECTIVITY DIAGNOSTICS
  # ============================================================================
  diagnose-connectivity:
    name: Diagnose Connectivity
    runs-on: ubuntu-latest
    needs: collect-diagnostics
    if: inputs.issue_type == 'connectivity_issue' && needs.collect-diagnostics.outputs.rg_exists == 'true'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Test connectivity
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ needs.collect-diagnostics.outputs.resource_group }}"
          echo "# Connectivity Diagnostics" > connectivity-diagnostics.txt

          FUNCTION_APPS=$(az functionapp list -g "$RESOURCE_GROUP" \
            --query "[].{name:name, hostname:defaultHostName}" -o tsv 2>/dev/null || echo "")

          if [[ -n "$FUNCTION_APPS" ]]; then
            echo "## Function App Connectivity" >> connectivity-diagnostics.txt
            while IFS=$'\t' read -r NAME HOSTNAME; do
              echo "### $NAME" >> connectivity-diagnostics.txt
              if timeout 10 curl -f -s -o /dev/null "https://$HOSTNAME"; then
                echo "✅ Reachable" >> connectivity-diagnostics.txt
              else
                echo "❌ Not reachable" >> connectivity-diagnostics.txt
                echo "  Fix: Check if the app is running, review firewall rules, verify DNS resolution" >> connectivity-diagnostics.txt
              fi
            done <<< "$FUNCTION_APPS"
          fi

          NAMESPACES=$(az servicebus namespace list -g "$RESOURCE_GROUP" --query "[].name" -o tsv 2>/dev/null || echo "")
          if [[ -n "$NAMESPACES" ]]; then
            echo "" >> connectivity-diagnostics.txt
            echo "## Service Bus Connectivity" >> connectivity-diagnostics.txt
            for NS in $NAMESPACES; do
              STATUS=$(az servicebus namespace show -g "$RESOURCE_GROUP" -n "$NS" --query "status" -o tsv 2>/dev/null || echo "unknown")
              echo "  $NS: $STATUS" >> connectivity-diagnostics.txt
            done
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: connectivity-diagnostics
          path: connectivity-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 90

  # ============================================================================
  # RESOURCE ERROR DIAGNOSTICS
  # ============================================================================
  diagnose-resource-error:
    name: Diagnose Resource Errors
    runs-on: ubuntu-latest
    needs: collect-diagnostics
    if: inputs.issue_type == 'resource_error' && needs.collect-diagnostics.outputs.rg_exists == 'true'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Diagnose resource issues
        continue-on-error: true
        run: |
          RESOURCE_GROUP="${{ needs.collect-diagnostics.outputs.resource_group }}"
          RESOURCE_NAME="${{ inputs.resource_name }}"
          echo "# Resource Error Diagnostics" > resource-diagnostics.txt

          if [[ -n "$RESOURCE_NAME" ]]; then
            echo "## Resource: $RESOURCE_NAME" >> resource-diagnostics.txt
            az resource show --resource-group "$RESOURCE_GROUP" --name "$RESOURCE_NAME" \
              -o json >> resource-diagnostics.txt 2>&1 || echo "Resource not found. Verify the resource name and type." >> resource-diagnostics.txt
          else
            echo "## All Resources" >> resource-diagnostics.txt
            az resource list --resource-group "$RESOURCE_GROUP" \
              --query "[].{name:name, type:type, location:location, provisioningState:provisioningState}" \
              -o table >> resource-diagnostics.txt 2>&1
          fi

          echo "" >> resource-diagnostics.txt
          echo "## Resources in Failed State" >> resource-diagnostics.txt
          az resource list --resource-group "$RESOURCE_GROUP" \
            --query "[?provisioningState=='Failed'].{name:name, type:type}" \
            -o table >> resource-diagnostics.txt 2>&1

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: resource-error-diagnostics
          path: resource-diagnostics.txt
          if-no-files-found: ignore
          retention-days: 90

  # ============================================================================
  # TROUBLESHOOTING SUMMARY
  # ============================================================================
  generate-report:
    name: Troubleshooting Summary
    runs-on: ubuntu-latest
    needs: [collect-diagnostics, analyze-deployment-failure, diagnose-performance, diagnose-connectivity, diagnose-resource-error]
    if: always()
    steps:
      - name: Troubleshooting summary
        run: |
          echo "## 🔧 Troubleshooting Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Issue Type | \`${{ inputs.issue_type }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | \`${{ inputs.resource_name || 'all' }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Description | ${{ inputs.description || 'N/A' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Step Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| General Diagnostics | ${{ needs.collect-diagnostics.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment Failure Analysis | ${{ needs.analyze-deployment-failure.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Performance Diagnostics | ${{ needs.diagnose-performance.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Connectivity Diagnostics | ${{ needs.diagnose-connectivity.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource Error Diagnostics | ${{ needs.diagnose-resource-error.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          RG_EXISTS="${{ needs.collect-diagnostics.outputs.rg_exists }}"
          if [[ "$RG_EXISTS" == "false" ]]; then
            echo "### ⚠️ Resource Group Not Found" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The resource group \`rg-aos-${{ inputs.environment }}\` does not exist. Run the **Infrastructure Deployment** workflow first to provision resources." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Common Fixes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Issue | Fix |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-----|" >> "$GITHUB_STEP_SUMMARY"
          echo "| OIDC login fails | Add federated identity credential with subject \`repo:ASISaga/aos-infrastructure:environment:${{ inputs.environment }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| RBAC permission denied | Grant SP \`Contributor\` + \`User Access Administrator\` on the resource group |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource not found | Run the deployment workflow to provision infrastructure |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Function App not running | Restart: \`az functionapp restart -g rg-aos-${{ inputs.environment }} -n <name>\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the artifact files from this workflow run for detailed diagnostics." >> "$GITHUB_STEP_SUMMARY"
